server {
    listen 80;
    server_name _;

    root /var/www/sinister-diesel;
    index index.html;

    # Password protection — only Sinister Diesel team can access
    auth_basic "Sinister Diesel — Internal Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Serve dashboard and static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API calls to dashboard-server.js on port 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        # Restrict CORS to same origin only
        add_header Access-Control-Allow-Origin $host;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer";

    access_log /var/log/nginx/sinister-diesel-access.log;
    error_log  /var/log/nginx/sinister-diesel-error.log;
}
