<mvt:item name="html_profile" />
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<base href="&mvt:global:basehref;">
	<mvt:if expr="NOT ISNULL l.settings:category:page_title">
		<title>&mvt:category:page_title;</title>
	<mvt:elseif expr="NOT ISNULL l.settings:page:title">
		<title>&mvt:page:title;</title>
	<mvt:else>
		<title>&mvt:store:name;: &mvt:category:name;</title>
	</mvt:if>
	<mvt:if expr="g.useDevResources EQ 1"><mvt:item name="head" param="css_list_dev" /><mvt:else><mvt:item name="head" param="css_list" /></mvt:if>
	<mvt:item name="head" param="head_tag" />
	<style>
		#searchspring-content .x-product-list__item .ss__price.ss__no__sale .x-product-list__price {
			color: #000 !important;
		}
	</style>
</head>
<body id="js-&mvte:page:code;" class="o-site-wrapper t-page-&mvt:global:pageClass; sd-page-ctgy<mvt:if expr="g.ss_enable EQ 'true' AND l.settings:page:code EQ 'CTGY' AND l.settings:category:code EQ g.ss_search_url"> ss-shop</mvt:if>">
	<mvt:item name="hdft" param="global_header" />

	<section class="sd-listing-page u-bg-white t-expanded-block" aria-label="Category products">
		<div class="o-wrapper t-wrapper sd-listing-shell">
			<div class="o-layout o-layout--row-reverse--l o-layout--wide sd-listing-layout">
				<div class="o-layout__item u-width-12 u-width-9--l sd-listing-results">
					<div id="searchspring-content"></div>
				</div>

				<aside class="o-layout__item u-block--l u-hidden u-width-3--l sd-listing-sidebar" aria-label="Product filters">
					<div id="searchspring-finder-hierarchy"></div>
					<div id="searchspring-sidebar"></div>
				</aside>
			</div>
		</div>
	</section>

	<mvt:item name="hdft" param="global_footer" />
</body>
</html>
