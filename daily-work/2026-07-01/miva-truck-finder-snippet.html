<form class="finder-form" data-miva-finder method="get" action="&mvte:urls:SRCH:rr;" role="search" aria-label="Shop by your truck">
	<input type="hidden" name="Search" value="">

	<div class="finder-label">
		<span>Shop by</span>
		<strong>Your Truck</strong>
	</div>

	<div class="finder-sep"></div>

	<div class="finder-field">
		<label for="finder-year">Year</label>
		<select class="finder-select" id="finder-year" name="Year">
			<option value="">Year</option>
			<option>2026</option>
			<option>2025</option>
			<option>2024</option>
			<option>2023</option>
			<option>2022</option>
			<option>2021</option>
			<option>2020</option>
			<option>2019</option>
			<option>2018</option>
			<option>2017</option>
			<option>2016</option>
			<option>2015</option>
			<option>2014</option>
			<option>2013</option>
			<option>2012</option>
			<option>2011</option>
			<option>2010</option>
		</select>
	</div>

	<div class="finder-field">
		<label for="finder-make">Make</label>
		<select class="finder-select" id="finder-make" name="Make">
			<option value="">Make</option>
			<option>Ford</option>
			<option>Chevy GMC</option>
			<option>Dodge Ram</option>
		</select>
	</div>

	<div class="finder-field">
		<label for="finder-model">Model</label>
		<select class="finder-select" id="finder-model" name="Model">
			<option value="">Model</option>
			<option>F-250 Super Duty</option>
			<option>F-350 Super Duty</option>
			<option>Silverado 2500 HD</option>
			<option>Silverado 3500 HD</option>
			<option>Sierra 2500 HD</option>
			<option>Sierra 3500 HD</option>
			<option>Ram 2500</option>
			<option>Ram 3500</option>
		</select>
	</div>

	<div class="finder-field">
		<label for="finder-engine">Engine</label>
		<select class="finder-select" id="finder-engine" name="Engine">
			<option value="">Engine Size</option>
			<option>7.3L Powerstroke</option>
			<option>6.0L Powerstroke</option>
			<option>6.4L Powerstroke</option>
			<option>6.7L Powerstroke</option>
			<option>6.6L Duramax</option>
			<option>5.9L Cummins</option>
			<option>6.7L Cummins</option>
		</select>
	</div>

	<button class="finder-apply" type="submit">Apply</button>
</form>
